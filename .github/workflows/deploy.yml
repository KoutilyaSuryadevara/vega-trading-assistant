name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'prod'
        type: choice
        options: [prod]
      component:
        description: 'Component to deploy'
        required: true
        default: 'all'
        type: choice
        options: [all, backend, frontend]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy backend to App Runner
    if: |
      github.event_name == 'push' ||
      github.event.inputs.component == 'all' ||
      github.event.inputs.component == 'backend'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_VEGA }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        run: |
          ECR_URI="${{ secrets.VEGA_ECR_URI }}"
          TAG="${{ steps.meta.outputs.tag }}"
          docker build -t $ECR_URI:$TAG -t $ECR_URI:latest ./backend
          docker push $ECR_URI:$TAG
          docker push $ECR_URI:latest
          echo "Pushed: $ECR_URI:$TAG"

      - name: Deploy to App Runner
        run: |
          aws apprunner start-deployment \
            --service-arn "${{ secrets.VEGA_APP_RUNNER_ARN }}"
          echo "Deployment triggered for App Runner service"

      - name: Wait for deployment
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${{ secrets.VEGA_APP_RUNNER_ARN }}" \
              --query 'Service.Status' --output text)
            echo "Status: $STATUS (attempt $i/30)"
            if [ "$STATUS" = "RUNNING" ]; then echo "Deployment complete"; exit 0; fi
            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "UPDATE_FAILED" ]; then
              echo "Deployment failed with status: $STATUS"; exit 1
            fi
            sleep 10
          done
          echo "Timeout waiting for deployment"; exit 1

  deploy-frontend:
    name: Deploy frontend to S3 + CloudFront
    if: |
      github.event_name == 'push' ||
      github.event.inputs.component == 'all' ||
      github.event.inputs.component == 'frontend'
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_VEGA }}
          aws-region: us-east-1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          VITE_API_URL="${{ secrets.VEGA_API_URL }}" npm run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.VEGA_FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          # index.html: no cache (allows instant rollbacks)
          aws s3 cp frontend/dist/index.html s3://${{ secrets.VEGA_FRONTEND_BUCKET }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.VEGA_CLOUDFRONT_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          echo "CloudFront invalidation: $INVALIDATION_ID"

      - name: Deployment summary
        run: |
          echo "## VEGA Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend URL:** ${{ secrets.VEGA_API_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
